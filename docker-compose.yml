services:
  # WordPress
  wordpress:
    image: wordpress:latest
    container_name: pericia-wordpress
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_USER: pericia
      WORDPRESS_DB_PASSWORD: pericia123
      WORDPRESS_DB_NAME: pericia_trabalhista
      WORDPRESS_TABLE_PREFIX: wp_
    volumes:
      - ./wordpress-data:/var/www/html
      - ./wordpress-plugin:/var/www/html/wp-content/plugins/pericia-trabalhista-pro
    depends_on:
      - db
    networks:
      - pericia-network

  # MySQL Database
  db:
    image: mysql:8.0
    container_name: pericia-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: pericia_trabalhista
      MYSQL_USER: pericia
      MYSQL_PASSWORD: pericia123
    volumes:
      - ./mysql-data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - pericia-network

  # phpMyAdmin
  adminer:
    image: adminer:latest
    container_name: pericia-adminer
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      ADMINER_DEFAULT_SERVER: db
      ADMINER_DEFAULT_USER: pericia
      ADMINER_DEFAULT_PASSWORD: pericia123
    depends_on:
      - db
    networks:
      - pericia-network

volumes:
  wordpress-data:
    driver: local
  mysql-data:
    driver: local

networks:
  pericia-network:
    driver: bridge
